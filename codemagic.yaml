workflows:
  # Debug build workflow - for testing
  debug:
    name: Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    
    environment:
      groups:
        - default
      android_signing:
        - debug_keystore  # Use debug keystore for debug builds
      vars:
        PACKAGE_NAME: "com.wakeup.app"
        
    scripts:
      - name: Set up Java
        script: |
          echo "Setting up Java 17..."
          export JAVA_HOME=$(/usr/libexec/java_home -v 17)
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          
      - name: Grant execute permissions
        script: |
          chmod +x gradlew
          
      - name: Download dependencies
        script: |
          ./gradlew dependencies
          
      - name: Run lint
        script: |
          ./gradlew lintDebug
          
      - name: Run tests
        script: |
          ./gradlew testDebugUnitTest
          
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug
          
    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/reports/lint-results-debug.html
      
    publishing:
      email:
        recipients:
          - developer@example.com
        notify:
          success: true
          failure: true

  # Release build workflow - for distribution
  release:
    name: Release Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    
    environment:
      groups:
        - default
      vars:
        PACKAGE_NAME: "com.wakeup.app"
        
    scripts:
      - name: Set up Java
        script: |
          echo "Setting up Java 17..."
          export JAVA_HOME=$(/usr/libexec/java_home -v 17)
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          
      - name: Grant execute permissions
        script: |
          chmod +x gradlew
          
      - name: Download dependencies
        script: |
          ./gradlew dependencies
          
      - name: Run tests
        script: |
          ./gradlew testReleaseUnitTest
          
      - name: Build release APK (unsigned)
        script: |
          ./gradlew assembleRelease
          
      - name: Build release AAB (unsigned)
        script: |
          ./gradlew bundleRelease
          
    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab
      
    publishing:
      email:
        recipients:
          - developer@example.com
        notify:
          success: true
          failure: true
