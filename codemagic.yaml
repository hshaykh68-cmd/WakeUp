workflows:
  # Debug build workflow - for testing
  debug:
    name: Debug Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    
    environment:
      groups:
        - default
      vars:
        PACKAGE_NAME: "com.wakeup.app"
        
    scripts:
      - name: Setup Gradle Wrapper
        script: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          
      - name: Download dependencies
        script: |
          ./gradlew dependencies
          
      - name: Run lint
        script: |
          ./gradlew lintDebug
          
      - name: Run tests
        script: |
          ./gradlew testDebugUnitTest
          
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug
          
    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/reports/lint-results-debug.html
      
    publishing:
      email:
        recipients:
          - developer@example.com
        notify:
          success: true
          failure: true

  # Release build workflow - for distribution
  release:
    name: Release Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    
    environment:
      groups:
        - default
      vars:
        PACKAGE_NAME: "com.wakeup.app"
        
    scripts:
      - name: Setup Gradle Wrapper
        script: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          
      - name: Download dependencies
        script: |
          ./gradlew dependencies
          
      - name: Run tests
        script: |
          ./gradlew testReleaseUnitTest
          
      - name: Build release APK (unsigned)
        script: |
          ./gradlew assembleRelease
          
      - name: Build release AAB (unsigned)
        script: |
          ./gradlew bundleRelease
          
    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab
      
    publishing:
      email:
        recipients:
          - developer@example.com
        notify:
          success: true
          failure: true
